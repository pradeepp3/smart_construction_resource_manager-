<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumaran Infratech — Construction Operations Platform</title>
    <meta name="description" content="Enterprise-grade construction resource management for multinational projects.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div id="app">

        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="sidebar" style="display:none;">
            <div class="sidebar-brand">
                <div class="brand-logo">K</div>
                <div>
                    <div class="brand-name">Kumaran Infratech</div>
                    <div class="brand-tagline">Ops Platform v2.0</div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" onclick="navigateTo('dashboard')" data-view="dashboard"
                    title="Dashboard">
                    <i class="ph ph-squares-four"></i>
                    <span class="nav-label">Dashboard</span>
                </button>
                <div class="nav-divider"></div>
                <div class="section-label" style="padding: 0 .5rem;">Management</div>
                <button class="nav-item" onclick="navigateTo('projects')" data-view="projects" title="Projects">
                    <i class="ph ph-briefcase"></i>
                    <span class="nav-label">Projects</span>
                </button>
                <button class="nav-item" onclick="navigateTo('labour')" data-view="labour" title="Labour" style="position: relative;">
                    <i class="ph ph-hard-hat"></i>
                    <span class="nav-label" style="flex:1; text-align:left;">Labour</span>
                    <i class="ph ph-caret-down" style="position:absolute; right:1rem; font-size:0.8rem;" onclick="event.stopPropagation(); toggleLabourMenu();" id="labourChevron"></i>
                </button>
                <div id="labourSubmenu" class="nav-submenu" style="display:none;">
                    <button class="nav-item sub-item" onclick="navigateTo('labour', 'Masonry')" data-view="labour-Masonry" title="Masonry">
                         <i class="ph ph-wall"></i><span class="nav-label">Masonry</span>
                    </button>
                    <button class="nav-item sub-item" onclick="navigateTo('labour', 'Centring')" data-view="labour-Centring" title="Centring">
                         <i class="ph ph-frame-corners"></i><span class="nav-label">Centring</span>
                    </button>
                    <button class="nav-item sub-item" onclick="navigateTo('labour', 'Concrete Team')" data-view="labour-Concrete Team" title="Concrete Team">
                         <i class="ph ph-truck"></i><span class="nav-label">Concrete Team</span>
                    </button>
                    <button class="nav-item sub-item" onclick="navigateTo('labour', 'Electrical & plumbing')" data-view="labour-Electrical & plumbing" title="Electrical & plumbing">
                         <i class="ph ph-lightning"></i><span class="nav-label">Elec & plumbing</span>
                    </button>
                    <button class="nav-item sub-item" onclick="navigateTo('labour', 'Tiles')" data-view="labour-Tiles" title="Tiles">
                         <i class="ph ph-squares-four"></i><span class="nav-label">Tiles</span>
                    </button>
                    <button class="nav-item sub-item" onclick="navigateTo('labour', 'Painting')" data-view="labour-Painting" title="Painting">
                         <i class="ph ph-paint-roller"></i><span class="nav-label">Painting</span>
                    </button>
                    <button class="nav-item sub-item" onclick="navigateTo('labour', 'Polish')" data-view="labour-Polish" title="Polish">
                         <i class="ph ph-sparkle"></i><span class="nav-label">Polish</span>
                    </button>
                    <button class="nav-item sub-item" onclick="navigateTo('labour', 'Others')" data-view="labour-Others" title="Others">
                         <i class="ph ph-users"></i><span class="nav-label">Others</span>
                    </button>
                </div>
                <button class="nav-item" onclick="navigateTo('materials')" data-view="materials" title="Materials">
                    <i class="ph ph-package"></i>
                    <span class="nav-label">Materials</span>
                </button>
                <button class="nav-item" onclick="navigateTo('equipment')" data-view="equipment" title="Equipment">
                    <i class="ph ph-truck"></i>
                    <span class="nav-label">Equipment</span>
                </button>
                <div class="nav-divider"></div>
                <div class="section-label" style="padding: 0 .5rem;">Finance</div>
                <button class="nav-item" onclick="navigateTo('finance')" data-view="finance" title="Finance">
                    <i class="ph ph-chart-pie-slice"></i>
                    <span class="nav-label">Finance</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <button class="nav-item" onclick="navigateTo('settings')" data-view="settings" title="Settings">
                    <i class="ph ph-gear"></i>
                </button>
                <button class="nav-item" id="themeBtn" onclick="toggleTheme()" title="Toggle Theme">
                    <i class="ph ph-sun"></i>
                </button>
                <button class="nav-item logout-btn" id="logoutBtn" title="Logout">
                    <i class="ph ph-sign-out"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Top Header -->
            <header class="top-header" id="top-header" style="display:none;">
                <div class="header-left">
                    <div class="header-project-info">
                        <h2 id="headerProjectName">Dashboard</h2>
                        <div class="project-status-badge">Active Project</div>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="search-bar">
                        <i class="ph ph-magnifying-glass"></i>
                        <input type="text" placeholder="Search anything... (Ctrl+K)" id="globalSearch">
                    </div>
                    <div class="header-icon-btn" title="Notifications" id="notifBtn">
                        <i class="ph ph-bell"></i>
                        <span class="notif-badge" id="notifBadge" style="display:none;">3</span>
                    </div>
                    <div class="user-chip" id="userChip">
                        <div class="user-chip-avatar" id="userAvatarChip">A</div>
                        <span class="user-chip-name" id="userNameChip">Admin</span>
                    </div>
                </div>
            </header>

            <div id="view-container"></div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay" style="display:none;">
        <div class="loading-logo">K</div>
        <div class="loading-bar">
            <div class="loading-bar-fill"></div>
        </div>
        <div class="loading-text">Initializing Platform...</div>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/project-manager.js"></script>
    <script src="js/modules/labour.js"></script>
    <script src="js/modules/labour-calculator.js"></script>
    <script src="js/modules/materials.js"></script>
    <script src="js/modules/equipment.js"></script>
    <script src="js/modules/finance.js"></script>
    <script src="js/modules/settings.js"></script>
</body>

</html>
